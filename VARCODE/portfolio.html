<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VACODE. - PORTFOLIO</title>
    <link rel="stylesheet" href="../css/VARCODE_style.css?v=2.1">
    
    <!-- 웹폰트 SUITE 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunnpoet/SUITE/fonts/static/woff2/SUITE.css">

    <style>
        /* 헤더와 콘텐츠 사이의 상단 여백 제거 */
        .VARCODE_contents.sub_contents {
            padding-top: 20px !important; 
        }
        
        /* 카테고리 메뉴 호버 시 텍스트 색상을 블랙으로 변경 */
        .filter_btn {
            transition: color 0.3s ease;
        }
        .filter_btn:hover {
            color: #000000 !important;
        }
    </style>
</head>
<body>

<header id="VARCODE_header">
    <div class="logo"><a href="../index.html"><img src="../img/logo_dark.svg" alt="VACODE." style="height:22px; display:block;"></a></div>
    <nav class="nav_menu">
        <a href="./about.html">ABOUT</a>
        <a href="./portfolio.html" class="active">PORTFOLIO</a>
        <a href="./contact.html">CONTACT</a>
    </nav>
    <div class="sns_links">
        <a href="#" target="_blank" aria-label="Naver Blog">
            <img src="../img/그룹 17.svg" alt="Naver Blog" style="width:22px; height:22px; vertical-align:middle;">
        </a>
        <a href="#" target="_blank" aria-label="Instagram">
            <img src="../img/그룹 14.svg" alt="Instagram" style="width:22px; height:22px; vertical-align:middle;">
        </a>
    </div>
</header>

<div id="VARCODE_wrap">
    <div class="VARCODE_layout">
        <aside class="VARCODE_sidebar">
            <div style="margin-top: 100px; display:flex; flex-direction:column; gap:15px; font-weight:bold; font-size:14px;">
                <a href="#" class="filter_btn active" data-filter="all" style="color: #000000;">ALL</a>
                <a href="#" class="filter_btn" data-filter="indoor" style="color: #838383;">INDOOR</a>
                <a href="#" class="filter_btn" data-filter="outdoor" style="color: #838383;">OUTDOOR</a>
            </div>
            <div class="info_footer"><p>vacode00@naver.com</p><p>F. 010-4738-8278</p></div>
        </aside>

        <main class="VARCODE_contents sub_contents">
            <div class="portfolio_grid">
                
                <div class="portfolio_item" data-category="outdoor" onclick="location.href='./portfolio_detail.html'">
                    <img src="../img/portfolio_01.png" class="portfolio_thumb" alt="365산본플란트치과의원">
                    <div class="portfolio_info">
                        <div class="pf_title">365산본플란트치과의원</div>
                        <div class="pf_link">VIEW MORE &gt;</div>
                    </div>
                </div>
                
                <div class="portfolio_item" data-category="indoor" onclick="location.href='./portfolio_detail.html'">
                    <img src="../img/portfolio_02.png" class="portfolio_thumb" alt="다움치과의원">
                    <div class="portfolio_info">
                        <div class="pf_title">다움치과의원</div>
                        <div class="pf_link">VIEW MORE &gt;</div>
                    </div>
                </div>

                <div class="portfolio_item" data-category="outdoor" onclick="location.href='./portfolio_detail.html'">
                    <img src="../img/portfolio_03.png" class="portfolio_thumb" alt="목동공감한의원">
                    <div class="portfolio_info">
                        <div class="pf_title">목동공감한의원</div>
                        <div class="pf_link">VIEW MORE &gt;</div>
                    </div>
                </div>

                <div class="portfolio_item" data-category="indoor" onclick="location.href='./portfolio_detail.html'">
                    <img src="../img/portfolio_04.png" class="portfolio_thumb" alt="의정부웰365의원">
                    <div class="portfolio_info">
                        <div class="pf_title">의정부웰365의원</div>
                        <div class="pf_link">VIEW MORE &gt;</div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>



<style>
    /* 카테고리 전환 시 부드러운 페이드인 애니메이션 */
    @keyframes portfolioFadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .portfolio_item {
        animation: portfolioFadeIn 0.4s ease forwards;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const filterButtons = document.querySelectorAll('.filter_btn');
        const portfolioItems = document.querySelectorAll('.portfolio_item');

        filterButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();

                // 활성화된 버튼 색상 및 클래스 토글
                filterButtons.forEach(btn => {
                    btn.style.color = '#838383';
                    btn.classList.remove('active');
                });
                this.style.color = '#000000';
                this.classList.add('active');

                const filterValue = this.getAttribute('data-filter');

                portfolioItems.forEach(item => {
                    const category = item.getAttribute('data-category');
                    if (filterValue === 'all' || category === filterValue) {
                        item.style.display = 'block';
                        // 브라우저 리플로우 강제 유발로 애니메이션 재실행
                        item.style.animation = 'none';
                        item.offsetHeight; // reflow
                        item.style.animation = null;
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    });
</script>

</body>
</html>
