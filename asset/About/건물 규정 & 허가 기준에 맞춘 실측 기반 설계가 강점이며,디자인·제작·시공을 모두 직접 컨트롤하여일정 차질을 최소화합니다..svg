일정 차질을 최소화합니다." transform="translate(0 16)" font-size="16" font-family="SUITE-Regular, SUITE" letter-spacing="-0.01em"><tspan x="0" y="0">건물 규정 &amp; 허가 기준에 맞춘 실측 기반 설계가 강점이며,</tspan><tspan x="0" y="28">디자인·제작·시공을 모두 직접 컨트롤하여</tspan><tspan x="0" y="56">일정 차질을 최소화합니다.</tspan></text>
