<svg xmlns="http://www.w3.org/2000/svg" width="343" height="76" viewBox="0 0 343 76">
  <text id="건물_규정_허가_기준에_맞춘_실측_기반_설계가_강점이며_디자인·제작·시공을_모두_직접_컨트롤하여_일정_차질을_최소화합니다." data-name="건물 규정 &amp; 허가 기준에 맞춘 실측 기반 설계가 강점이며,
