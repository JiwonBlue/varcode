<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VACODE. - CONTACT</title>
    <link rel="stylesheet" href="../css/VACODE_style.css?v=2.1">
    
    <!-- 웹폰트 SUITE 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunnpoet/SUITE/fonts/static/woff2/SUITE.css">

    <style>
        /* 헤더와 콘텐츠 사이의 상단 여백 제거 */
        .VACODE_contents.sub_contents {
            padding-top: 20px !important;
        }

        /* 남겨주신 문의를... 텍스트 스타일을 기획부터 시공까지... 와 일치 */
        .contact_header_txt {
            font-size: 26px !important;
            font-weight: bold !important;
            line-height: 1.45 !important;
            letter-spacing: -0.2px !important;
            color: var(--vc-black) !important;
            margin-bottom: 40px !important;
        }

        /* 주소 영역 회색 박스 제거 */
        .contact_info_layout {
            background: transparent !important;
            padding: 0 !important;
            margin-bottom: 50px !important;
        }

        .contact_map_placeholder {
            width: 50%;
            height: 280px !important;
        }

        .contact_meta_info {
            padding: 20px 0 20px 40px !important;
            justify-content: center !important;
            gap: 30px !important;
            overflow: hidden !important; /* 대형 contact 텍스트로 인한 가로 스크롤/터짐 방지 */
        }

        /* 인풋 영역 높이 60px 기준 여백 조정 */
        .form_group {
            margin-bottom: 20px !important; /* 입력 영역 간격 조정 */
            padding: 5px 0 !important;
        }
        .form_label {
            font-size: 13px !important;
            margin-bottom: 5px !important;
            color: var(--vc-black) !important;
        }
        .form_input {
            height: 60px !important; /* 높이 60px 기준 */
            padding: 10px 0 !important;
            font-size: 16px !important;
        }
        .form_textarea {
            height: 140px !important;
        }

        /* 모바일 반응형 대응 */
        @media (max-width: 1024px) {
            .contact_map_placeholder {
                width: 100% !important;
                height: 250px !important;
            }
            .contact_meta_info {
                padding: 20px 0 !important;
            }
        }
    </style>
</head>
<body>

<header id="VACODE_header">
    <div class="logo"><a href="../index.html"><img src="../img/logo_dark.svg" alt="VACODE." style="height:22px; display:block;"></a></div>
    <nav class="nav_menu">
        <a href="./about.html">ABOUT</a>
        <a href="./portfolio.html">PORTFOLIO</a>
        <a href="./contact.html" class="active">CONTACT</a>
    </nav>
    <div class="sns_links">
        <a href="#" target="_blank" aria-label="Naver Blog">
            <img src="../img/그룹 17.svg" alt="Naver Blog" style="width:22px; height:22px; vertical-align:middle;">
        </a>
        <a href="#" target="_blank" aria-label="Instagram">
            <img src="../img/그룹 14.svg" alt="Instagram" style="width:22px; height:22px; vertical-align:middle;">
        </a>
    </div>
</header>

<div id="VACODE_wrap">
    <div class="VACODE_layout">
        <aside class="VACODE_sidebar">
            <div><h1 class="slogan_title">기획부터 시공까지<br />공간의 완성도를<br />기준으로.</h1></div>
            <div class="info_footer"><p>vacode00@naver.com</p><p>F. 010-4738-8278</p></div>
        </aside>

        <main class="VACODE_contents sub_contents">
            <p class="contact_header_txt">남겨주신 문의를 바탕으로 공간의 가치를 높이는 최적의 솔루션을 안내하겠습니다.</p>
            
            <div class="contact_info_layout">
                <div class="contact_map_placeholder" style="border-radius: 4px; overflow: hidden;">
                    <iframe src="https://maps.google.com/maps?q=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%EA%B9%80%ED%8F%AC%EC%8B%9C%20%EC%96%91%EC%B1%A4%EC%9D%8D%20%EB%93%AC%EB%B0%95%EB%A1%9C%2033-16&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="contact_meta_info" style="position: relative; overflow: visible;">
                    <!-- 대형 contact 블러 효과 배경 텍스트 (140pt, blur ~3px) -->
                    <div style="position: absolute; top: 50%; left: 0; transform: translateY(-50%); font-size: 140pt; font-weight: 900; color: rgba(0, 0, 0, 0.03); filter: blur(3px); z-index: -1; user-select: none; pointer-events: none; text-transform: lowercase; font-family: sans-serif; line-height: 1;">contact</div>
                    
                    <div class="meta_row"><h5>상담 시간</h5><p>09:00 ~ 18:00</p></div>
                    <div class="meta_row"><h5>주소</h5><p>경기 김포시 양촌읍 듬박로 33-16</p></div>
                </div>
            </div>

            <form id="contact_form" onsubmit="alert('문의가 전송되었습니다.'); return false;">
                <div class="form_group"><label class="form_label">+ COMPANY NAME</label><input type="text" class="form_input" placeholder="업체명을 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ ADDRESS</label><input type="text" class="form_input" placeholder="주소를 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ CONTACT ADDRESS</label><input type="tel" class="form_input" placeholder="연락처를 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ E-MAIL</label><input type="email" class="form_input" placeholder="이메일을 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ CONTENTS</label><textarea class="form_input form_textarea" placeholder="내용을 입력해 주세요" required></textarea></div>
                <button type="submit" class="form_submit_btn"><span>SEND &gt;</span></button>
            </form>
        </main>
    </div>
</div>
</div>


</body>
</html>
